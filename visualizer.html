<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShipSafe — Codebase Graph</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<style>
  :root {
    --bg:        #080c12;
    --surface:   #0e1520;
    --surface2:  #131d2e;
    --border:    rgba(99,140,200,0.12);
    --border2:   rgba(99,140,200,0.22);
    --text:      #dce8f5;
    --muted:     #5a7398;
    --accent:    #4f8ef7;
    --accent2:   #7eb8ff;
    --green:     #3dd68c;
    --purple:    #a78bfa;
    --amber:     #f4b942;
    --red:       #f87171;
    --teal:      #38bdf8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #upload-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 0;
  }

  #upload-screen.gone { display: none; }

  .upload-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    width: 100%;
    max-width: 480px;
    padding: 0 24px;
  }

  .brand { display: flex; flex-direction: column; align-items: center; gap: 8px; }

  .brand-logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .brand-title {
    font-size: 42px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .brand-title span { color: var(--accent); font-weight: 600; }
  .brand-sub { font-size: 14px; color: var(--muted); font-weight: 300; }

  .drop-area {
    width: 100%;
    border: 1.5px dashed var(--border2);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,142,247,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .drop-area:hover, .drop-area.over { border-color: var(--accent); background: rgba(79,142,247,0.04); }

  .drop-icon {
    width: 44px; height: 44px;
    margin: 0 auto 16px;
    background: rgba(79,142,247,0.1);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .drop-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .drop-area h3 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .drop-area p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .drop-area code {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: rgba(79,142,247,0.1); color: var(--accent2);
    padding: 2px 7px; border-radius: 4px;
  }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 22px; font-size: 13px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.1px;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  #file-input { display: none; }

  #app { display: none; flex-direction: column; height: 100vh; }
  #app.visible { display: flex; }

  header {
    height: 52px; display: flex; align-items: center;
    padding: 0 20px; border-bottom: 1px solid var(--border);
    gap: 20px; flex-shrink: 0; background: var(--surface);
  }

  .h-brand { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }
  .h-div { width: 1px; height: 20px; background: var(--border); }

  .h-stats { display: flex; gap: 16px; flex: 1; }
  .stat { font-size: 12px; color: var(--muted); }
  .stat strong { color: var(--text); font-weight: 500; }

  .h-controls { display: flex; align-items: center; gap: 8px; }

  .sw { position: relative; }
  .sw svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; stroke: var(--muted); fill: none; stroke-width: 2; pointer-events: none; }

  input[type="text"] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); padding: 6px 10px 6px 30px;
    font-size: 12px; font-family: 'DM Sans', sans-serif; width: 180px;
    outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); padding: 6px 10px;
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    outline: none; cursor: pointer; transition: border-color 0.15s;
  }
  select:hover { border-color: var(--border2); }

  .btn-sm {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--muted); padding: 6px 12px;
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-sm:hover { color: var(--text); border-color: var(--border2); }

  #body { display: flex; flex: 1; overflow: hidden; }

  #cy {
    flex: 1; background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(79,142,247,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(167,139,250,0.03) 0%, transparent 50%);
  }

  #panel {
    width: 260px; background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }

  .panel-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

  .panel-body { flex: 1; overflow-y: auto; padding: 16px; }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .empty { color: var(--muted); font-size: 12px; line-height: 1.7; text-align: center; padding-top: 32px; }

  .node-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; word-break: break-all; }

  .node-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 20px; font-size: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px;
  }
  .node-badge .dot { width: 5px; height: 5px; border-radius: 50%; }

  .slabel { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 16px; }

  .ai-summary { font-size: 12px; color: var(--text); line-height: 1.6; background: rgba(79,142,247,0.06); border-left: 2px solid var(--accent); padding: 8px 10px; border-radius: 0 6px 6px 0; margin-bottom: 8px; }

  .ai-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }

  .ai-pill { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; border: 1px solid; background: rgba(79,142,247,0.1); color: var(--accent2); border-color: rgba(79,142,247,0.3); }

  .ai-pill.purpose { background: rgba(167,139,250,0.1); color: #a78bfa; border-color: rgba(167,139,250,0.3); }

  .ai-summary {
    font-size: 12px; color: var(--text); line-height: 1.6;
    background: rgba(79,142,247,0.06); border-left: 2px solid var(--accent);
    padding: 8px 10px; border-radius: 0 6px 6px 0; margin-bottom: 8px;
  }

  .ai-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }

  .ai-pill {
    font-size: 10px; font-weight: 500; padding: 2px 8px;
    border-radius: 20px; border: 1px solid;
    background: rgba(79,142,247,0.1); color: var(--accent2);
    border-color: rgba(79,142,247,0.3); text-transform: lowercase;
  }

  .ai-pill.purpose { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.3); }

  .mrow {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border);
  }
  .mrow:last-child { border-bottom: none; }
  .mkey { color: var(--muted); flex-shrink: 0; }
  .mval { color: var(--text); text-align: right; font-family: 'DM Mono', monospace; font-size: 11px; max-width: 150px; word-break: break-all; }

  .citem {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 7px; cursor: pointer;
    transition: background 0.1s; margin-bottom: 2px;
  }
  .citem:hover { background: var(--surface2); }
  .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .clabel { font-size: 11px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'DM Mono', monospace; }
  .ctype { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .legend { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 10px; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .ld { width: 8px; height: 8px; border-radius: 50%; }

  #loading { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 200; }
  #loading.show { display: flex; }

  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #lmsg { font-size: 13px; color: var(--muted); }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 9px 18px; border-radius: 8px; font-size: 12px; transition: transform 0.3s ease; z-index: 999; pointer-events: none; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="upload-screen">
  <div class="upload-wrap">
    <div class="brand">
      <div class="brand-logo">ShipSafe</div>
      <div class="brand-title">Code<span>Graph</span></div>
      <div class="brand-sub">Semantic codebase visualizer</div>
    </div>
    <div class="drop-area" id="drop-zone">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </div>
      <h3>Drop your graph.json</h3>
      <p>Generate it by running:<br/><code>node parser.js ./your-project --output graph.json</code></p>
      <button class="btn-primary" onclick="document.getElementById('file-input').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Load graph.json
      </button>
    </div>
  </div>
  <input type="file" id="file-input" accept=".json" />
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="lmsg">Building graph...</div>
</div>

<div id="app">
  <header>
    <div class="h-brand">ShipSafe</div>
    <div class="h-div"></div>
    <div class="h-stats" id="stats"></div>
    <div class="h-controls">
      <div class="sw">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search..." oninput="doSearch(this.value)" />
      </div>
      <select id="tf" onchange="doFilter()">
        <option value="all">All types</option>
        <option value="file">Files</option>
        <option value="class">Classes</option>
        <option value="method">Methods</option>
        <option value="function">Functions</option>
      </select>
      <select id="ls" onchange="doLayout(this.value)">
        <option value="cose">Force</option>
        <option value="breadthfirst">Tree</option>
        <option value="circle">Circle</option>
        <option value="concentric">Concentric</option>
        <option value="grid">Grid</option>
      </select>
      <button class="btn-sm" onclick="cy&&cy.fit(undefined,60)">Fit</button>
      <button class="btn-sm" onclick="resetView()">Reset</button>
      <button class="btn-sm" onclick="document.getElementById('file-input').click()">Load JSON</button>
    </div>
  </header>
  <div id="body">
    <div id="cy"></div>
    <div id="panel">
      <div class="panel-header"><div class="panel-title">Inspector</div></div>
      <div class="panel-body" id="pb"><div class="empty">Click any node<br/>to inspect it</div></div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:#4f8ef7"></div>File</div>
        <div class="li"><div class="ld" style="background:#a78bfa"></div>Class</div>
        <div class="li"><div class="ld" style="background:#3dd68c"></div>Method</div>
        <div class="li"><div class="ld" style="background:#f4b942"></div>Function</div>
        <div class="li"><div class="ld" style="background:#38bdf8"></div>Interface</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const TC = { file:"#4f8ef7", class:"#a78bfa", method:"#3dd68c", function:"#f4b942", interface:"#38bdf8", property:"#64748b", default:"#475569" };
const EC = { IMPORTS:"#4f8ef7", CALLS:"#3dd68c", EXTENDS:"#a78bfa", IMPLEMENTS:"#38bdf8", default:"#1e3a5f" };
const SHOW_EDGES = new Set(["IMPORTS","CALLS","EXTENDS","IMPLEMENTS","DEPENDS_ON"]);

let cy = null;

// File handling
document.getElementById("file-input").addEventListener("change", e => { if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value=""; });
const dz = document.getElementById("drop-zone");
dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("over"); });
dz.addEventListener("dragleave", () => dz.classList.remove("over"));
dz.addEventListener("drop", e => { e.preventDefault(); dz.classList.remove("over"); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

function loadFile(file) {
  document.getElementById("upload-screen").classList.add("gone");
  document.getElementById("loading").classList.add("show");
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      document.getElementById("lmsg").textContent = `Rendering ${data.nodes.length} nodes...`;
      setTimeout(() => buildGraph(data), 80);
    } catch { alert("Invalid JSON."); document.getElementById("upload-screen").classList.remove("gone"); document.getElementById("loading").classList.remove("show"); }
  };
  r.readAsText(file);
}

function buildGraph(data) {
  const els = [];
  const validIds = new Set();

  for (const n of data.nodes) {
    if (n.type === "call" || n.type === "property") continue;
    validIds.add(n.id);
    els.push({ group:"nodes", data:{ id:n.id, label:cleanLabel(n.label,n.type), fullLabel:n.label, type:n.type, color:TC[n.type]||TC.default, filePath:n.filePath||"", line:n.line||null, isAsync:n.isAsync, isExported:n.isExported, returnType:n.returnType||null, params:n.params||[], ai_summary:n.ai_summary||null, ai_purpose:n.ai_purpose||null, ai_complexity:n.ai_complexity||null, ai_risk:n.ai_risk||null } });
  }

  for (const e of data.edges) {
    if (!validIds.has(e.from)||!validIds.has(e.to)||!SHOW_EDGES.has(e.type)) continue;
    els.push({ group:"edges", data:{ id:`${e.from}~~${e.type}~~${e.to}`, source:e.from, target:e.to, type:e.type, color:EC[e.type]||EC.default } });
  }

  cy = cytoscape({
    container: document.getElementById("cy"),
    elements: els,
    style: [
      { selector:"node", style:{
        "background-color":"data(color)", "background-opacity":0.9,
        "label":"data(label)", "color":"#dce8f5",
        "font-family":"DM Mono, monospace",
        "font-size": e => ({file:11,class:11,method:10,function:10,interface:10}[e.data("type")]||9)+"px",
        "text-valign":"bottom","text-halign":"center","text-margin-y":5,
        "text-outline-width":3,"text-outline-color":"#080c12",
        "width": e => ({file:34,class:28,interface:22,method:18,function:18}[e.data("type")]||14),
        "height": e => ({file:34,class:28,interface:22,method:18,function:18}[e.data("type")]||14),
        "border-width":0, "z-index":5,
        "transition-property":"opacity","transition-duration":"0.15s"
      }},
      { selector:"node:selected", style:{ "border-width":2.5,"border-color":"#ffffff","shadow-blur":16,"shadow-color":"data(color)","shadow-opacity":0.7,"shadow-offset-x":0,"shadow-offset-y":0,"z-index":20 }},
      { selector:"node.lit", style:{ "border-width":2,"border-color":"data(color)","shadow-blur":10,"shadow-color":"data(color)","shadow-opacity":0.5,"shadow-offset-x":0,"shadow-offset-y":0,"opacity":1,"z-index":15 }},
      { selector:"node.dim", style:{ "opacity":0.1 }},
      { selector:"edge", style:{ "width":1,"line-color":"data(color)","target-arrow-color":"data(color)","target-arrow-shape":"triangle","arrow-scale":0.7,"curve-style":"bezier","opacity":0.4,"z-index":1,"transition-property":"opacity,width","transition-duration":"0.15s" }},
      { selector:"edge[type='IMPORTS']", style:{ "line-style":"dashed","line-dash-pattern":[5,4],"opacity":0.3 }},
      { selector:"edge.lit", style:{ "opacity":0.9,"width":2 }},
      { selector:"edge.dim", style:{ "opacity":0.03 }},
    ],
    layout: {
      name:"cose", animate:true, animationDuration:700,
      nodeRepulsion:()=>12000, idealEdgeLength:()=>120,
      edgeElasticity:()=>100, gravity:0.4, numIter:1200,
      initialTemp:200, coolingFactor:0.95, minTemp:1.0,
      randomize:true, padding:60
    },
    minZoom:0.1, maxZoom:4
  });

  cy.on("tap","node", e => inspectNode(e.target));
  cy.on("tap", e => { if (e.target===cy) clearInspect(); });
  cy.on("mouseover","node", e => e.target.style("cursor","pointer"));

  const counts = {};
  for (const n of data.nodes) if (n.type!=="call"&&n.type!=="property") counts[n.type]=(counts[n.type]||0)+1;
  document.getElementById("stats").innerHTML =
    Object.entries(counts).map(([t,c])=>`<div class="stat"><strong>${c}</strong> ${t}s</div>`).join("") +
    `<div class="stat"><strong>${data.edges.length}</strong> edges</div>`;

  document.getElementById("loading").classList.remove("show");
  document.getElementById("app").classList.add("visible");
}

function inspectNode(node) {
  cy.elements().removeClass("lit dim");
  const hood = node.closedNeighborhood();
  hood.addClass("lit");
  cy.elements().not(hood).addClass("dim");
  node.select();
  renderPanel(node);
}

function clearInspect() {
  cy.elements().removeClass("lit dim");
  cy.elements("node").unselect();
  document.getElementById("pb").innerHTML = `<div class="empty">Click any node<br/>to inspect it</div>`;
}

function renderPanel(node) {
  const d = node.data();
  const color = d.color;
  const inn = node.incomers("node");
  const out = node.outgoers("node");

  let html = `
    <div class="node-name">${d.fullLabel||d.label}</div>
    <div class="node-badge" style="background:${color}18;color:${color};border:1px solid ${color}30">
      <div class="dot" style="background:${color}"></div>${d.type}
    </div>
    <div class="slabel">Details</div>
    <div class="mrow"><span class="mkey">File</span><span class="mval">${d.filePath||"—"}</span></div>
    ${d.line?`<div class="mrow"><span class="mkey">Line</span><span class="mval">${d.line}</span></div>`:""}
    ${d.isAsync!=null?`<div class="mrow"><span class="mkey">Async</span><span class="mval">${d.isAsync?"yes":"no"}</span></div>`:""}
    ${d.isExported!=null?`<div class="mrow"><span class="mkey">Exported</span><span class="mval">${d.isExported?"yes":"no"}</span></div>`:""}
    ${d.returnType?`<div class="mrow"><span class="mkey">Returns</span><span class="mval">${d.returnType}</span></div>`:""}
  `;

  if (d.ai_summary || d.ai_purpose || d.ai_complexity || d.ai_risk) {
    html += `<div class="slabel">AI Analysis</div>`;
    if (d.ai_summary) html += `<div class="ai-summary">${d.ai_summary}</div>`;
    html += `<div class="ai-pills">`;
    if (d.ai_purpose) html += `<span class="ai-pill purpose">${d.ai_purpose}</span>`;
    if (d.ai_complexity) {
      const cc = {low:"#3dd68c",medium:"#f4b942",high:"#f87171"}[d.ai_complexity]||"#8b949e";
      html += `<span class="ai-pill" style="background:${cc}18;color:${cc};border-color:${cc}40">${d.ai_complexity} complexity</span>`;
    }
    if (d.ai_risk) {
      const rc = {low:"#3dd68c",medium:"#f4b942",high:"#f87171"}[d.ai_risk]||"#8b949e";
      html += `<span class="ai-pill" style="background:${rc}18;color:${rc};border-color:${rc}40">${d.ai_risk} risk</span>`;
    }
    html += `</div>`;
  }

  if (d.ai_summary || d.ai_purpose || d.ai_complexity || d.ai_risk) {
    html += `<div class="slabel">AI Analysis</div>`;
    if (d.ai_summary) html += `<div class="ai-summary">${d.ai_summary}</div>`;
    html += `<div class="ai-pills">`;
    if (d.ai_purpose) html += `<span class="ai-pill purpose">${d.ai_purpose}</span>`;
    if (d.ai_complexity) {
      const cc = {low:"#3dd68c",medium:"#f4b942",high:"#f87171"}[d.ai_complexity]||"#8b949e";
      html += `<span class="ai-pill" style="background:${cc}18;color:${cc};border-color:${cc}40">${d.ai_complexity} complexity</span>`;
    }
    if (d.ai_risk) {
      const rc = {low:"#3dd68c",medium:"#f4b942",high:"#f87171"}[d.ai_risk]||"#8b949e";
      html += `<span class="ai-pill" style="background:${rc}18;color:${rc};border-color:${rc}40">${d.ai_risk} risk</span>`;
    }
    html += `</div>`;
  }

  if (d.params&&d.params.length>0) {
    html += `<div class="slabel">Params</div>`;
    for (const p of d.params) html += `<div class="mrow"><span class="mkey">${p.name}</span><span class="mval">${p.type}</span></div>`;
  }

  if (inn.length>0) {
    html += `<div class="slabel">Incoming (${inn.length})</div>`;
    inn.forEach(n => { const nd=n.data(); html+=`<div class="citem" onclick="jumpTo('${nd.id}')"><div class="cdot" style="background:${nd.color}"></div><span class="clabel">${nd.fullLabel||nd.label}</span><span class="ctype">${nd.type}</span></div>`; });
  }

  if (out.length>0) {
    html += `<div class="slabel">Outgoing (${out.length})</div>`;
    out.forEach(n => { const nd=n.data(); html+=`<div class="citem" onclick="jumpTo('${nd.id}')"><div class="cdot" style="background:${nd.color}"></div><span class="clabel">${nd.fullLabel||nd.label}</span><span class="ctype">${nd.type}</span></div>`; });
  }

  document.getElementById("pb").innerHTML = html;
}

function jumpTo(id) {
  const n = cy.getElementById(id);
  if (!n.length) return;
  cy.animate({ center:{eles:n}, zoom:1.8 }, { duration:350 });
  inspectNode(n);
}

function doSearch(q) {
  if (!cy) return;
  cy.elements().removeClass("lit dim");
  if (!q.trim()) return;
  const matched = cy.nodes().filter(n => (n.data("fullLabel")||n.data("label")||"").toLowerCase().includes(q.toLowerCase()));
  if (!matched.length) return;
  cy.elements().addClass("dim");
  matched.removeClass("dim").addClass("lit");
  matched.connectedEdges().removeClass("dim").addClass("lit");
}

function doFilter() {
  if (!cy) return;
  const t = document.getElementById("tf").value;
  cy.elements().removeClass("lit dim");
  if (t==="all") return;
  cy.nodes().filter(n => n.data("type")!==t).addClass("dim");
}

function doLayout(name) {
  if (!cy) return;
  toast("Applying layout...");
  const configs = {
    cose:{ name:"cose",animate:true,animationDuration:700,nodeRepulsion:()=>12000,idealEdgeLength:()=>120,gravity:0.4,numIter:1200,randomize:true,padding:60 },
    breadthfirst:{ name:"breadthfirst",animate:true,animationDuration:500,directed:true,padding:60,spacingFactor:1.4 },
    circle:{ name:"circle",animate:true,animationDuration:500,padding:60 },
    concentric:{ name:"concentric",animate:true,animationDuration:500,padding:60,minNodeSpacing:40 },
    grid:{ name:"grid",animate:true,animationDuration:500,padding:60 },
  };
  cy.layout(configs[name]||configs.cose).run();
}

function resetView() {
  if (!cy) return;
  cy.elements().removeClass("lit dim");
  document.getElementById("search").value="";
  document.getElementById("tf").value="all";
  clearInspect();
  cy.fit(undefined,60);
}

function cleanLabel(label,type) {
  if (type==="file") { const p=label.replace(/\\/g,"/").split("/"); return p[p.length-1]; }
  if (label.length>22) return label.substring(0,20)+"…";
  return label;
}

function toast(msg) {
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2000);
}

document.addEventListener("keydown", e => {
  if (e.key==="Escape") clearInspect();
  if ((e.metaKey||e.ctrlKey)&&e.key==="f") { e.preventDefault(); document.getElementById("search")?.focus(); }
});
</script>
</body>
</html>
